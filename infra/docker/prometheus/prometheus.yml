global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api-service'
    scrape_interval: 5s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:8000']

  - job_name: 'ai-gateway'
    scrape_interval: 5s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['gateway:8001']
